<section class="form-panel" aria-label="Create or edit 3D object">
  <h2>{{ isEditMode ? 'Edit object' : 'New object' }}</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="field">
      <label for="shape">Shape</label>
      <select id="shape" formControlName="shape">
        <option *ngFor="let s of shapeOptions" [ngValue]="s">{{ s }}</option>
      </select>
    </div>


    <div class="field">
      <label for="color">Color</label>
      <input id="color" type="text" formControlName="color" placeholder="e.g. #ff00aa or red" />
    </div>


    <div class="field">
      <label for="size">Size</label>
      <input id="size" type="number" formControlName="size" />
    </div>


    <div class="field-group">
      <label class="group-label">Position</label>
      <div class="inline-row">
        <div class="inline-field">
          <label for="positionX">X</label>
          <input id="positionX" type="number" formControlName="positionX" />
        </div>
        <div class="inline-field">
          <label for="positionY">Y</label>
          <input id="positionY" type="number" formControlName="positionY" />
        </div>
        <div class="inline-field">
          <label for="positionZ">Z</label>
          <input id="positionZ" type="number" formControlName="positionZ" />
        </div>
      </div>
    </div>


    <div class="field-group">
      <span class="group-label">Rotation (degrees)</span>

      <div class="inline-row">
        <div class="inline-field">
          <label for="rotationRoll">Roll</label>
          <input id="rotationRoll" type="number" formControlName="rotationRoll" />
        </div>
        <div class="inline-field">
          <label for="rotationPitch">Pitch</label>
          <input id="rotationPitch" type="number" formControlName="rotationPitch" />
        </div>
        <div class="inline-field">
          <label for="rotationYaw">Yaw</label>
          <input id="rotationYaw" type="number" formControlName="rotationYaw" />
        </div>
      </div>
    </div>

    <p class="err" *ngIf="error">{{ error }}</p>

    <div class="form-actions">
      <button type="submit" [disabled]="busy || form.invalid">{{ isEditMode ? 'Update' : 'Create' }}</button>
      <button *ngIf="isEditMode" type="button" class="secondary" (click)="newObject()" [disabled]="busy">New
        object</button>
    </div>

  </form>
</section>
